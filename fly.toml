app = "nordavix-api"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

# Run Alembic migrations once per deploy in an ephemeral machine before any
# app machines start serving the new image. If this fails the rollout aborts.
[deploy]
  release_command = "alembic upgrade head"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine always running so PDF-export requests never hit
  # a cold-start delay (cold starts were causing intermittent
  # "Network Error" reports on the financials Export button).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  # 1GB so PDF rendering (ReportLab + parsed report data + FastAPI
  # baseline) doesn't OOM-kill the process under peak. 512mb was
  # tight enough that big "full package" PDFs would occasionally
  # crash mid-build and the browser saw the dropped connection as
  # a "Network Error".
  memory = "1gb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 8000
    timeout = "5s"
    type = "http"
