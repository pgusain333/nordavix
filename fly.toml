app = "nordavix-api"
primary_region = "iad"

[build]
  dockerfile = "backend/Dockerfile"

# Run Alembic migrations once per deploy in an ephemeral machine before any
# app machines start serving the new image. If this fails the rollout aborts.
[deploy]
  release_command = "alembic upgrade head"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    port = 8000
    timeout = "5s"
    type = "http"
