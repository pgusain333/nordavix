<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Nordavix — OG card</title>
  <!-- Belt + braces: robots.txt blocks this URL too, but if anyone
       lands here directly they get a clean tab title. -->
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,450;1,9..144,500&family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────────────────────────
       NORDAVIX — Open Graph card · "The close, explained itself."

       Renders a single 1200×630 design (the <body> IS the card, so a
       headless screenshot at that window size is pixel-exact). Saved as
       frontend/public/og-image.png and served at /og-image.png — the URL
       in the og:image + twitter:image meta tags (index.html + SEO.tsx).

       RE-EXPORT TO PNG (auto, what we use):
         chrome --headless=new --disable-gpu --hide-scrollbars \
           --force-device-scale-factor=2 --window-size=1200,630 \
           --virtual-time-budget=5000 \
           --screenshot=frontend/public/og-image.png \
           "file:///<abs>/frontend/public/og-image.html"
         (scale-factor 2 → a crisp 2400×1260 PNG, same 1.91:1 ratio.)

       Edit the markup below to tweak the design, then re-run the command.
    ───────────────────────────────────────────────────────────── */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }

    body {
      position: relative;
      padding: 76px 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      background:
        radial-gradient(120% 80% at 26% 4%, rgba(70, 138, 108, 0.34) 0%, transparent 56%),
        radial-gradient(80% 70% at 88% 6%, rgba(46, 122, 85, 0.16) 0%, transparent 52%),
        linear-gradient(158deg, #0d2a22 0%, #0b2019 46%, #07140f 100%);
    }

    /* Subtle grid for depth — fades toward the bottom so the footer stays clean. */
    .grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(244,241,233,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244,241,233,0.045) 1px, transparent 1px);
      background-size: 64px 64px;
      -webkit-mask-image: radial-gradient(130% 95% at 50% 0%, #000 0%, transparent 80%);
              mask-image: radial-gradient(130% 95% at 50% 0%, #000 0%, transparent 80%);
    }

    /* ── Top row: logo lockup + decorative ticker ── */
    .top { position: relative; z-index: 2; display: flex; align-items: flex-start; }

    .lockup { display: flex; align-items: center; gap: 20px; }
    .mark { width: 72px; height: 72px; display: block; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.35)); }
    .wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 42px; font-weight: 700; letter-spacing: -0.04em;
      color: #F4F1E9; display: inline-flex; align-items: center; gap: 10px;
    }
    .wordmark .sq { width: 10px; height: 10px; border-radius: 2px; background: #5BB089; box-shadow: 0 0 14px rgba(91,176,137,0.6); margin-top: 16px; }

    /* Faded financial ticker, top-right — pure texture. */
    .ticker {
      position: absolute; top: 4px; right: 0;
      font-family: 'JetBrains Mono', monospace; font-size: 19px; line-height: 2.0;
      color: rgba(244,241,233,0.30);
      display: grid; grid-template-columns: auto auto auto; gap: 4px 28px;
      text-align: right; white-space: nowrap;
    }
    .ticker .up   { color: rgba(127,184,155,0.62); }
    .ticker .down { color: rgba(202,123,99,0.60); }

    /* ── Middle: kicker + headline + tagline ── */
    .middle { position: relative; z-index: 2; }
    .kicker {
      display: inline-flex; align-items: center; gap: 12px;
      font-family: 'JetBrains Mono', monospace; font-size: 19px; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase; color: #7FB89B;
      margin-bottom: 30px;
    }
    .kicker .sq { width: 12px; height: 12px; border-radius: 2px; background: #2E7A55; box-shadow: 0 0 14px rgba(46,122,85,0.65); }

    .headline {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 94px; line-height: 1.02; letter-spacing: -0.022em;
      font-weight: 600; color: #F4F1E9;
    }
    .headline .l2 {
      display: block; font-style: italic; font-weight: 500;
      color: #9CC4AD; letter-spacing: -0.018em;
    }

    .tagline {
      margin-top: 30px; max-width: 1000px;
      font-size: 30px; font-weight: 500; line-height: 1.42;
      letter-spacing: -0.005em; color: #A6B7AF;
    }

    /* ── Bottom: divider + url + pills ── */
    .bottom { position: relative; z-index: 2; }
    .rule { height: 1px; width: 100%; background: rgba(244,241,233,0.14); margin-bottom: 26px; }
    .footrow { display: flex; align-items: center; justify-content: space-between; }
    .url {
      font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500;
      color: #8AA399; letter-spacing: 0.01em;
    }
    .pills { display: flex; gap: 12px; }
    .pill {
      font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase; color: #C3D2C9;
      border: 1px solid rgba(244,241,233,0.22); border-radius: 999px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>
  <div class="grid"></div>

  <!-- Top -->
  <div class="top">
    <div class="lockup">
      <svg class="mark" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-label="nordavix mark">
        <rect x="0" y="0" width="48" height="48" rx="12" fill="#0A0F0D" />
        <rect x="0.6" y="0.6" width="46.8" height="46.8" rx="11.4" fill="none" stroke="rgba(244,241,233,0.10)" stroke-width="1.2" />
        <path d="M15 34 L15 17 M15 21 Q15 17 19 17 L29 17 Q33 17 33 21 L33 34"
          fill="none" stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="33" cy="34" r="2.6" fill="#5BB089" />
      </svg>
      <span class="wordmark">nordavix<span class="sq"></span></span>
    </div>

    <div class="ticker">
      <span>4310</span><span>2,345,678</span><span class="up">&#9650; 24.1%</span>
      <span>5120</span><span>1,890,432</span><span class="down">&#9660; 12.4%</span>
      <span>6005</span><span>567,204</span><span class="up">&#9650;&nbsp; 8.3%</span>
      <span>7150</span><span>234,019</span><span class="down">&#9660; 31.7%</span>
    </div>
  </div>

  <!-- Middle -->
  <div class="middle">
    <div class="kicker"><span class="sq"></span> The AI Close Platform</div>
    <div class="headline">
      The close,
      <span class="l2">explained itself.</span>
    </div>
    <div class="tagline">
      AI-native flux analysis and month-end automation for controllers who are
      done with the last week of every month.
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="rule"></div>
    <div class="footrow">
      <div class="url">nordavix.com</div>
      <div class="pills">
        <span class="pill">Flux</span>
        <span class="pill">Reconcile</span>
        <span class="pill">Audit-Ready</span>
      </div>
    </div>
  </div>
</body>
</html>
