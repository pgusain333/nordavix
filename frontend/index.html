<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons — SVG for modern browsers, PNG fallback for older + iOS -->
    <link rel="icon" type="image/svg+xml" href="/logo-mark-dark.svg" />
    <link rel="apple-touch-icon" href="/logo-mark-dark.svg" />

    <!-- Primary tags (Google search result, browser tab) -->
    <title>Nordavix - The AI-native month-end close</title>
    <meta name="description" content="AI-prepared reconciliations, flux analysis, schedules, and the executive financial package. Close your books in days, not weeks. Built by CPAs for CPAs." />
    <meta name="theme-color" content="#3E8F66" />

    <!-- No <link rel="canonical"> here on purpose.
         We're an SPA: every route serves this same index.html, so a
         static canonical pointing to "/" would tell Google that every
         page (/solutions, /help, /terms, /privacy) is a duplicate of
         the homepage. That triggered the GSC warning:
           "Alternate page with proper canonical tag"
         and consolidated all 5 sitemap URLs into a single indexed page.

         Without a static canonical, Google indexes each route on its
         own merits. If true duplicates from query strings (e.g.
         ?utm_source=…) become a problem later, add per-route canonical
         via react-helmet-async or move to a pre-rendered build. -->

    <!-- Open Graph (LinkedIn, Facebook, Slack, iMessage, most chat apps) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nordavix.com/" />
    <meta property="og:site_name" content="Nordavix" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Nordavix - The AI-native month-end close" />
    <meta property="og:description" content="AI-prepared reconciliations, flux analysis, schedules, and the executive financial package. Close in days, not weeks." />
    <meta property="og:image" content="https://nordavix.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nordavix - The AI-native month-end close" />

    <!-- Twitter / X card (Twitter Card Validator: cards-dev.twitter.com/validator) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nordavix - The AI-native month-end close" />
    <meta name="twitter:description" content="AI-prepared reconciliations, flux analysis, schedules, and the executive financial package. Close in days, not weeks." />
    <meta name="twitter:image" content="https://nordavix.com/og-image.png" />
    <meta name="twitter:image:alt" content="Nordavix - The AI-native month-end close" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
