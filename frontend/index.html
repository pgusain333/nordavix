<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons. Google search results + older browsers use favicon.ico (the
         root fallback Google always probes); modern browsers prefer the PNG /
         crisp SVG for tabs; iOS uses the PNG apple-touch-icon. All render the
         brand 'n' mark on the cream brand square. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark-dark.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA manifest — declares app name + icons for the install prompt
         and gives Google a mobile-quality signal. -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Primary tags (Google search result, browser tab) — these are
         the FALLBACK values. Every public route also renders an <SEO>
         component (react-helmet-async) that overrides these per-route
         with a unique title + description + canonical. -->
    <title>Nordavix - The AI-native month-end close</title>
    <meta name="description" content="AI-prepared reconciliations, flux analysis, schedules, and the executive financial package. Close your books in days, not weeks. Built by CPAs for CPAs." />
    <meta name="theme-color" content="#3E8F66" />

    <!-- Per-route canonical is now emitted by the <SEO> component on
         each marketing page (HomePage, SolutionsPage, PublicHelpPage,
         TermsPage, PrivacyPage, and each blog post). No static canonical
         here on purpose — a static one pointing to "/" would tell Google
         that every page is a duplicate of the homepage (the bug that
         caused the GSC "Alternate page with proper canonical" warning
         the last time we tried it). -->

    <!-- Structured data — always-on Organization + SoftwareApplication
         schemas. Rich snippets in Google search results: brand sidebar,
         app rating widget, sitelinks. Per-page schemas (FAQPage,
         BreadcrumbList, Article) are emitted dynamically by <SEO>. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type":    "Organization",
      "name":     "Nordavix",
      "url":      "https://nordavix.com",
      "logo":     "https://nordavix.com/icon-512.png",
      "description": "AI-native month-end close platform for CPA firms and corporate controllers. AI-prepared reconciliations, flux analysis, intercompany consolidation, schedules, and the executive financial package.",
      "sameAs": [
        "https://www.linkedin.com/company/nordavix/",
        "https://www.crunchbase.com/organization/nordavix"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context":               "https://schema.org",
      "@type":                  "SoftwareApplication",
      "name":                   "Nordavix",
      "applicationCategory":    "BusinessApplication",
      "applicationSubCategory": "Accounting Software",
      "operatingSystem":        "Web",
      "url":                    "https://nordavix.com",
      "description":            "AI-prepared month-end close software: reconciliations, flux analysis, intercompany consolidation, schedules, and the executive financial package. Connects to QuickBooks Online.",
      "offers": {
        "@type":        "Offer",
        "price":        "0",
        "priceCurrency": "USD",
        "description":  "Free during beta"
      }
    }
    </script>

    <!-- Open Graph (LinkedIn, Facebook, Slack, iMessage, most chat apps) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nordavix.com/" />
    <meta property="og:site_name" content="Nordavix" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Nordavix - The AI-native month-end close" />
    <meta property="og:description" content="AI-prepared reconciliations, flux analysis, schedules, and the executive financial package. Close in days, not weeks." />
    <meta property="og:image" content="https://nordavix.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Nordavix - The AI-native month-end close" />

    <!-- Twitter / X card (Twitter Card Validator: cards-dev.twitter.com/validator) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nordavix - The AI-native month-end close" />
    <meta name="twitter:description" content="AI-prepared reconciliations, flux analysis, schedules, and the executive financial package. Close in days, not weeks." />
    <meta name="twitter:image" content="https://nordavix.com/og-image.png" />
    <meta name="twitter:image:alt" content="Nordavix - The AI-native month-end close" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts WITHOUT blocking first paint: fetch the stylesheet as
         `media=print` (the browser doesn't block rendering on it), then
         promote it to `all` once it has loaded. `display=swap` already paints
         text immediately in a system fallback and swaps to the webfont when it
         arrives, so this only removes the render-blocking wait, not the font.
         <noscript> keeps it working with JavaScript disabled. -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,wght@0,450;0,550;0,640;1,450;1,550&display=swap" />
    <link rel="stylesheet" media="print" onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,wght@0,450;0,550;0,640;1,450;1,550&display=swap" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,wght@0,450;0,550;0,640;1,450;1,550&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
