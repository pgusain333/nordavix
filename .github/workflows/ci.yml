name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint, typecheck, migrate, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nordavix_test
          POSTGRES_USER: nordavix
          POSTGRES_PASSWORD: nordavix_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://nordavix:nordavix_test@localhost:5432/nordavix_test
      TEST_DATABASE_URL: postgresql+asyncpg://nordavix:nordavix_test@localhost:5432/nordavix_test
      REDIS_URL: redis://localhost:6379/0
      # Dummy values for settings validation — real secrets never in CI env
      CLERK_SECRET_KEY: sk_test_ci
      CLERK_PUBLISHABLE_KEY: pk_test_ci
      CLERK_JWKS_URL: https://example.clerk.accounts.dev/.well-known/jwks.json
      R2_ACCOUNT_ID: ci
      R2_ACCESS_KEY_ID: ci
      R2_SECRET_ACCESS_KEY: ci
      R2_BUCKET_NAME: ci
      R2_PUBLIC_URL: https://example.r2.dev
      ANTHROPIC_API_KEY: sk-ant-ci
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      # Mypy runs but doesn't fail CI — the codebase has too many
      # pre-existing union-attr / type-arg warnings to gate deploys on.
      # Keep the report visible so we can clean up incrementally.
      - name: Type check (mypy, non-blocking)
        run: mypy . --ignore-missing-imports || true

      - name: Run migrations
        run: alembic upgrade head

      # Accuracy invariants — the pure, deterministic accounting-correctness
      # checks (JE balance, cash-flow tie-out, expectation/memory tolerance
      # safety, GL-accuracy detectors). These BLOCK: a regression here fails CI
      # and the backend never deploys. No DB/async, so they're fast + stable.
      - name: Accuracy invariants (blocking)
        run: pytest -m invariant -q

      # The rest (DB + async integration) stay non-blocking for now — the
      # tenant_isolation suite has a flaky asyncio event-loop bug with the
      # newer pytest-asyncio that needs a dedicated fix. Promote to blocking
      # once that's fixed.
      - name: Integration + async tests (non-blocking)
        run: pytest -m "not invariant" --cov=. --cov-report=xml -q || true

  frontend:
    name: Frontend — typecheck, build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run typecheck

      - name: Build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: pk_test_ci
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

  deploy-backend:
    name: Deploy backend to Fly.io
    needs: backend
    runs-on: ubuntu-latest
    # Only deploy on push to main — PRs run CI but don't deploy.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  deploy-frontend:
    name: Deploy frontend to Vercel
    needs: frontend
    runs-on: ubuntu-latest
    # Only on push to main. If the Vercel secrets aren't configured yet, the
    # deploy step SKIPS cleanly (stays green) instead of failing — so adding
    # this job never breaks CI. Add three repo secrets to turn it on:
    #   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
    # (Settings → Secrets and variables → Actions). Runs from the repo root and
    # uses the official `vercel pull/build/deploy` flow, which respects the
    # project's Root Directory + production env vars from Vercel.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy (production)
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Vercel secrets not configured — skipping frontend deploy."
            echo "Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID under"
            echo "Settings -> Secrets and variables -> Actions to enable it."
            exit 0
          fi
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
