# Render Blueprint — Nordavix API
# Deploy at: render.com/dashboard → New → Blueprint → select this repo
#
# After first deploy, set these secrets in each service's Environment tab:
#   DATABASE_URL, REDIS_URL, CLERK_SECRET_KEY, CLERK_PUBLISHABLE_KEY,
#   CLERK_JWKS_URL, ANTHROPIC_API_KEY, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
#   R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME, R2_PUBLIC_URL,
#   QBO_CLIENT_ID, QBO_CLIENT_SECRET, QBO_REDIRECT_URI, SENTRY_DSN

services:

  # ── FastAPI web service ───────────────────────────────────────────────────────
  - type: web
    name: nordavix-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: "https://nordavix.vercel.app,https://nordavix.com,https://www.nordavix.com"
      - key: QBO_SANDBOX
        value: "false"
      # ── secrets (fill in Render dashboard → Environment tab) ──────────────────
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: QBO_CLIENT_ID
        sync: false
      - key: QBO_CLIENT_SECRET
        sync: false
      - key: QBO_REDIRECT_URI
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Celery worker (AI narrative generation) ───────────────────────────────────
  - type: worker
    name: nordavix-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: .
    plan: starter
    region: oregon
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: SENTRY_DSN
        sync: false
